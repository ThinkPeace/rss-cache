name: Build RSS Cache

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Build static site
        run: |
          python scripts/build_site.py \
            --opml feeds.opml \
            --archive-dir archive \
            --output dist \
            --feed-timeout 12 \
            --article-timeout 15 \
            --feed-workers 12 \
            --article-workers 16 \
            --site-url "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"

      - name: Commit archive updates
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          if [ -z "$(git status --porcelain -- archive)" ]; then
            echo "No archive changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add archive
          git commit -m "chore: update article archive"
          git push origin "HEAD:${BRANCH_NAME}"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
